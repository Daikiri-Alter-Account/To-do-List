<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aplicación de To do List" />
  <title>To do List | Reto</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="app-container">
    <h1>To do List</h1>

    <div class="info">
      Total: <span id="contador-total">0</span> |
      Completadas: <span id="contador-completadas">0</span>
    </div>

    <div class="input-container">
      <input type="text" id="input-tarea" placeholder="Escribe una tarea..." />
      <button id="btn-agregar">Agregar</button>
    </div>

    <div class="filtros">
      <button class="filtro-btn activo" id="btn-todas">Todas</button>
      <button class="filtro-btn" id="btn-completadas">Completadas</button>
      <button class="filtro-btn" id="btn-pendientes">Pendientes</button>
    </div>

    <ul id="lista-tareas"></ul>
  </div>

  <script type="module" src="js/app.js"></script>
</body>

</html>
